<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styling.css">
    <title>Document</title>
</head>

<body>

    <nav>
        <img src="./Asset/Image/Harian_jogja.svg" alt="Girl in a jacket">
        <img src="./Asset/Image/logo-star-atas.png" class="logo-custom">
        <p>GRIYA HARIAN JOGJA <br>Jl.AM Sangaji No. 41, Yogyakarta<br>Telp. 0274-583183<br>Fax. 0274-564440</p>
    </nav>

    <div class="container">
        <h1>Surat Keterangan<br>Penyiaran dan Penayangan Kehilangan STNK</h1>

        <form action="#" method="POST">

            <div class="form-group">
                <label for="tanggal">Tanggal Kehilangan</label>
                <input type="date" id="nama" name="nama" placeholder="Masukkan Tanggal" required>
            </div>

            <div class="form-group">
                <label for="merk">Merk Kendaraan</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Merk Kendaraan Anda" required>
            </div>

            <div class="form-group">
                <label for="Nopol">Nomor Polisi</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nomor Polisi Kendaraan Anda" required>
            </div>

            <div class="form-group">
                <label for="no-mesin">Nomor Mesin</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nomor Mesin Kendaraan Anda" required>
            </div>

            <div class="form-group">
                <label for="no-rangka">Nomor Rangka</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Nomor Rangka Kendaraan Anda" required>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat Pemilik</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan Alamat Pemilik" required>
            </div>
        </form>

    </div>



</body>
